{% extends 'base.html' %}
{% block title %}Page Not Found | EMSI Blog{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-2 text-center">
    <div class="mb-4">
        <svg class="w-20 h-20 text-gray-300 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>
    </div>
    
    <h1 class="text-5xl font-extrabold text-gray-900 tracking-tight mb-3">404</h1>
    <h2 class="text-xl font-bold text-gray-700 mb-4">Oops! We couldn't find that page.</h2>
    
    <p class="text-sm text-gray-500 max-w-sm mx-auto mb-6">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    
    <a href="/" class="inline-flex items-center gap-2 bg-emsi text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-emsiDark transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>

    </a>
</div>
{% endblock %}
